name: Desktop Release

# Builds the desktop app for macOS/Windows/Linux and publishes the release to
# this repo, Rizzist/diffforge-client.
#
# Triggers:
#   - tag push v*          -> build + publish
#   - workflow_dispatch    -> build only, unless the "publish" input is true
#
# Publishing uses the workflow GITHUB_TOKEN. Tag pushes publish automatically;
# workflow_dispatch publishes only when the "publish" input is true.
#
# Required secret for OTA updates: TAURI_SIGNING_PRIVATE_KEY (minisign key
# generated with `tauri signer generate`; pubkey lives in tauri.conf.json).
# It signs the updater artifacts (.app.tar.gz / -setup.exe / .AppImage) that
# feed the in-app updater via updater.json.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a release to Rizzist/diffforge-client"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: macos-aarch64
          # x86_64-apple-darwin is unsupported: shiguredo_libvpx's build
          # script rejects os=macos, arch=x86_64 (Intel Macs not supported).
    runs-on: macos-14
    continue-on-error: true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}
      - run: npm ci
      # Signing identity handling, best → worst:
      #   1. Developer ID Application cert (chains to Apple's trusted root) —
      #      enables NOTARIZATION, so downloads open with a plain double-click.
      #   2. Legacy self-signed "Diff Forge AI Distribution" cert — seals the
      #      bundle (no "damaged" error, TCC grants survive updates) but can't
      #      be notarized, so Gatekeeper still shows the unverified-dev gate.
      #   3. No cert → ad-hoc: per-build cdhash breaks TCC grants on update.
      # The step auto-detects which cert the p12 holds and configures the rest.
      # Secrets: MACOS_SIGNING_CERT_P12_BASE64 (base64 .p12) and
      # MACOS_SIGNING_CERT_PASSWORD (its export password).
      - name: Import macOS signing certificate
        env:
          MACOS_SIGNING_CERT_P12_BASE64: ${{ secrets.MACOS_SIGNING_CERT_P12_BASE64 }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_SIGNING_CERT_P12_BASE64" ]; then
            echo "::warning::MACOS_SIGNING_CERT_P12_BASE64 not set — this release will be ad-hoc signed and macOS permission grants will break on update"
            exit 0
          fi
          p12="$RUNNER_TEMP/dist-cert.p12"
          cert="$RUNNER_TEMP/dist-cert.pem"
          keychain="$RUNNER_TEMP/diffforge-sign.keychain-db"
          keychain_password="$(openssl rand -hex 16)"
          printf '%s' "$MACOS_SIGNING_CERT_P12_BASE64" | base64 -d > "$p12"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$p12" -k "$keychain" -P "$MACOS_SIGNING_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_password" "$keychain" > /dev/null
          security list-keychains -d user -s "$keychain" login.keychain-db
          # Prefer a real Developer ID Application identity (notarizable, and
          # chains to Apple's already-trusted root so no manual trust needed).
          identity="$(security find-identity -v -p codesigning "$keychain" \
            | sed -n 's/.*"\(Developer ID Application: [^"]*\)".*/\1/p' | head -1)"
          if [ -n "$identity" ]; then
            echo "Using Developer ID identity: $identity"
            echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
          else
            # Legacy self-signed cert: codesign only offers identities whose
            # certs chain to trust, so trust it explicitly (runner-local only).
            echo "::warning::No Developer ID Application cert in p12 — falling back to self-signed identity (NOT notarizable; Gatekeeper will show the unverified-developer gate)"
            /usr/bin/openssl pkcs12 -in "$p12" -clcerts -nokeys -out "$cert" \
              -passin "pass:$MACOS_SIGNING_CERT_PASSWORD"
            sudo security add-trusted-cert -d -r trustRoot -p codeSign \
              -k /Library/Keychains/System.keychain "$cert"
            echo "APPLE_SIGNING_IDENTITY=Diff Forge AI Distribution" >> "$GITHUB_ENV"
          fi
          security find-identity -v -p codesigning "$keychain"
      - name: Build dmg and updater archive
        # When APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID are set AND the app is
        # signed with a Developer ID identity, the Tauri bundler notarizes the
        # .app with notarytool and staples the ticket before packaging the dmg,
        # so downloads open with a plain double-click (no Gatekeeper prompt).
        # These are no-ops for the self-signed fallback.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build --target ${{ matrix.target }} --bundles app,dmg --config src-tauri/tauri.updater.conf.json
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: windows-x86_64
      - run: npm ci
      - name: Build NSIS installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npx tauri build --bundles nsis --config src-tauri/tauri.updater.conf.json
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-windows-x86_64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error

  build-linux:
    # 24.04: libspa 0.8 (pipewire bindings, via scap) needs newer pipewire
    # headers than 22.04's pipewire 0.3.48 provides.
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libasound2-dev libudev-dev libpipewire-0.3-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: linux-x86_64
      - run: npm ci
      - name: Build deb, rpm, and AppImage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npx tauri build --bundles deb,rpm,appimage --config src-tauri/tauri.updater.conf.json
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-linux-x86_64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows, build-linux]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> "$GITHUB_OUTPUT"
      - name: Verify tag matches app version
        if: github.ref_type == 'tag'
        run: |
          if [ "${{ github.ref_name }}" != "v${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag ${{ github.ref_name }} does not match tauri.conf.json version ${{ steps.version.outputs.version }}"
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: staging
          merge-multiple: true
      - name: Normalize artifact names
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p out
          found=0
          # Artifacts keep their bundle-relative layout (dmg/, macos/, deb/,
          # rpm/, appimage/; windows lands flat), so walk files recursively.
          while IFS= read -r f; do
            base=$(basename "$f")
            # .sig patterns must precede their base patterns; the only mac
            # updater archive is arm64 (Intel is out of the matrix).
            case "$base" in
              *.app.tar.gz.sig) dest="diffforge-ai-${VERSION}-macos-aarch64.app.tar.gz.sig" ;;
              *.app.tar.gz)     dest="diffforge-ai-${VERSION}-macos-aarch64.app.tar.gz" ;;
              *.exe.sig)        dest="diffforge-ai-${VERSION}-windows-x86_64-setup.exe.sig" ;;
              *.AppImage.sig)   dest="diffforge-ai-${VERSION}-linux-x86_64.AppImage.sig" ;;
              *.AppImage)       dest="diffforge-ai-${VERSION}-linux-x86_64.AppImage" ;;
              *_aarch64.dmg) dest="diffforge-ai-${VERSION}-macos-aarch64.dmg" ;;
              *_x64.dmg)     dest="diffforge-ai-${VERSION}-macos-x86_64.dmg" ;;
              *.exe)         dest="diffforge-ai-${VERSION}-windows-x86_64-setup.exe" ;;
              *.deb)         dest="diffforge-ai-${VERSION}-linux-x86_64.deb" ;;
              *.rpm)         dest="diffforge-ai-${VERSION}-linux-x86_64.rpm" ;;
              *) echo "::warning::Skipping unrecognized artifact $base"; continue ;;
            esac
            cp "$f" "out/$dest"
            found=1
          done < <(find staging -type f | sort)
          if [ "$found" = "0" ]; then
            echo "::error::No build artifacts produced by any platform job"
            exit 1
          fi
          (cd out && sha256sum * > SHA256SUMS)
          ls -la out
      - name: Generate latest.json
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const version = require('./src-tauri/tauri.conf.json').version;
          const sums = Object.fromEntries(
            fs.readFileSync('out/SHA256SUMS', 'utf8').trim().split('\n')
              .map((line) => line.trim().split(/\s+/))
              .map(([hash, file]) => [file, hash])
          );
          const entries = [
            [`diffforge-ai-${version}-macos-aarch64.dmg`, 'darwin-aarch64', 'dmg'],
            [`diffforge-ai-${version}-macos-x86_64.dmg`, 'darwin-x86_64', 'dmg'],
            [`diffforge-ai-${version}-windows-x86_64-setup.exe`, 'windows-x86_64', 'nsis'],
            [`diffforge-ai-${version}-linux-x86_64.deb`, 'linux-x86_64', 'deb'],
          ];
          const platforms = {};
          for (const [file, key, format] of entries) {
            if (!sums[file]) continue;
            platforms[key] = {
              url: `https://github.com/Rizzist/diffforge-client/releases/download/v${version}/${file}`,
              sha256: sums[file],
              format,
              size: fs.statSync(`out/${file}`).size,
            };
          }
          const manifest = {
            name: 'Diff Forge AI',
            version,
            pubDate: new Date().toISOString().slice(0, 10),
            platforms,
          };
          fs.writeFileSync('out/latest.json', JSON.stringify(manifest, null, 2) + '\n');
          console.log(fs.readFileSync('out/latest.json', 'utf8'));
          EOF
      - name: Generate updater.json
        run: |
          node - <<'EOF'
          // Tauri-updater feed: same platform keys as latest.json, but the
          // URLs point at the updater ARCHIVES (.app.tar.gz / setup.exe /
          // .AppImage) and carry their minisign signatures inline.
          const fs = require('fs');
          const version = require('./src-tauri/tauri.conf.json').version;
          const entries = [
            [`diffforge-ai-${version}-macos-aarch64.app.tar.gz`, 'darwin-aarch64'],
            [`diffforge-ai-${version}-windows-x86_64-setup.exe`, 'windows-x86_64'],
            [`diffforge-ai-${version}-linux-x86_64.AppImage`, 'linux-x86_64'],
          ];
          const platforms = {};
          for (const [file, key] of entries) {
            const sigPath = `out/${file}.sig`;
            if (!fs.existsSync(`out/${file}`) || !fs.existsSync(sigPath)) continue;
            platforms[key] = {
              url: `https://github.com/Rizzist/diffforge-client/releases/download/v${version}/${file}`,
              signature: fs.readFileSync(sigPath, 'utf8').trim(),
            };
          }
          const manifest = {
            version,
            pub_date: new Date().toISOString(),
            platforms,
          };
          fs.writeFileSync('out/updater.json', JSON.stringify(manifest, null, 2) + '\n');
          console.log(`updater.json platforms: ${Object.keys(platforms).join(', ') || 'none'}`);
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: out/*
      - name: Decide whether to publish
        id: gate
        run: |
          if [ "${{ github.ref_type }}" = "tag" ] || [ "${{ inputs.publish }}" = "true" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Build-only run; pass publish=true or push a tag to publish."
          fi
      - name: Publish release to diffforge-client
        if: steps.gate.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ steps.version.outputs.version }}
          name: Diff Forge AI v${{ steps.version.outputs.version }}
          make_latest: true
          files: out/*
          body: |
            Diff Forge AI desktop client v${{ steps.version.outputs.version }}.

            Install with the CLI: `diffforge desktop install` — or download the
            artifact for your platform below and verify it against `SHA256SUMS`.
            The machine-readable feed for this release is `latest.json`.
