name: Desktop Release

# Builds the desktop app for macOS/Windows/Linux and publishes the release to
# the public distribution repo Rizzist/diffforge-client-releases (source stays private).
#
# Triggers:
#   - tag push v*          -> build + publish
#   - workflow_dispatch    -> build only, unless the "publish" input is true
#
# Required secret for publishing: RELEASES_GITHUB_TOKEN
#   (fine-grained PAT, repo Rizzist/diffforge-client-releases, Contents: Read and write).
# Without it the workflow still builds and uploads a "release-bundle" workflow
# artifact, and the publish step is skipped with a warning.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a release to Rizzist/diffforge-client-releases"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: macos-aarch64
          # x86_64-apple-darwin is unsupported: shiguredo_libvpx's build
          # script rejects os=macos, arch=x86_64 (Intel Macs not supported).
    runs-on: macos-14
    continue-on-error: true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}
      - run: npm ci
      - name: Build dmg
        run: npx tauri build --target ${{ matrix.target }} --bundles dmg
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: windows-x86_64
      - run: npm ci
      - name: Build NSIS installer
        run: npx tauri build --bundles nsis
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-windows-x86_64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    # 24.04: libspa 0.8 (pipewire bindings, via scap) needs newer pipewire
    # headers than 22.04's pipewire 0.3.48 provides.
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libasound2-dev libudev-dev libpipewire-0.3-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: linux-x86_64
      - run: npm ci
      - name: Build deb and rpm
        run: npx tauri build --bundles deb,rpm
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-linux-x86_64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows, build-linux]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> "$GITHUB_OUTPUT"
      - name: Verify tag matches app version
        if: github.ref_type == 'tag'
        run: |
          if [ "${{ github.ref_name }}" != "v${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag ${{ github.ref_name }} does not match tauri.conf.json version ${{ steps.version.outputs.version }}"
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: staging
          merge-multiple: true
      - name: Normalize artifact names
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p out
          shopt -s nullglob
          found=0
          for f in staging/*; do
            base=$(basename "$f")
            case "$base" in
              *_aarch64.dmg) dest="diffforge-ai-${VERSION}-macos-aarch64.dmg" ;;
              *_x64.dmg)     dest="diffforge-ai-${VERSION}-macos-x86_64.dmg" ;;
              *.exe)         dest="diffforge-ai-${VERSION}-windows-x86_64-setup.exe" ;;
              *.deb)         dest="diffforge-ai-${VERSION}-linux-x86_64.deb" ;;
              *.rpm)         dest="diffforge-ai-${VERSION}-linux-x86_64.rpm" ;;
              *) echo "::warning::Skipping unrecognized artifact $base"; continue ;;
            esac
            cp "$f" "out/$dest"
            found=1
          done
          if [ "$found" = "0" ]; then
            echo "::error::No build artifacts produced by any platform job"
            exit 1
          fi
          (cd out && sha256sum * > SHA256SUMS)
          ls -la out
      - name: Generate latest.json
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const version = require('./src-tauri/tauri.conf.json').version;
          const sums = Object.fromEntries(
            fs.readFileSync('out/SHA256SUMS', 'utf8').trim().split('\n')
              .map((line) => line.trim().split(/\s+/))
              .map(([hash, file]) => [file, hash])
          );
          const entries = [
            [`diffforge-ai-${version}-macos-aarch64.dmg`, 'darwin-aarch64', 'dmg'],
            [`diffforge-ai-${version}-macos-x86_64.dmg`, 'darwin-x86_64', 'dmg'],
            [`diffforge-ai-${version}-windows-x86_64-setup.exe`, 'windows-x86_64', 'nsis'],
            [`diffforge-ai-${version}-linux-x86_64.deb`, 'linux-x86_64', 'deb'],
          ];
          const platforms = {};
          for (const [file, key, format] of entries) {
            if (!sums[file]) continue;
            platforms[key] = {
              url: `https://github.com/Rizzist/diffforge-client-releases/releases/download/v${version}/${file}`,
              sha256: sums[file],
              format,
              size: fs.statSync(`out/${file}`).size,
            };
          }
          const manifest = {
            name: 'Diff Forge AI',
            version,
            pubDate: new Date().toISOString().slice(0, 10),
            platforms,
          };
          fs.writeFileSync('out/latest.json', JSON.stringify(manifest, null, 2) + '\n');
          console.log(fs.readFileSync('out/latest.json', 'utf8'));
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: out/*
      - name: Decide whether to publish
        id: gate
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_GITHUB_TOKEN }}
        run: |
          if [ -z "$RELEASES_TOKEN" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RELEASES_GITHUB_TOKEN is not set — skipping publish to Rizzist/diffforge-client-releases"
          elif [ "${{ github.ref_type }}" = "tag" ] || [ "${{ inputs.publish }}" = "true" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Build-only run; pass publish=true or push a tag to publish."
          fi
      - name: Publish release to diffforge-client
        if: steps.gate.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          repository: Rizzist/diffforge-client-releases
          token: ${{ secrets.RELEASES_GITHUB_TOKEN }}
          tag_name: v${{ steps.version.outputs.version }}
          name: Diff Forge AI v${{ steps.version.outputs.version }}
          make_latest: true
          files: out/*
          body: |
            Diff Forge AI desktop client v${{ steps.version.outputs.version }}.

            Install with the CLI: `diffforge desktop install` — or download the
            artifact for your platform below and verify it against `SHA256SUMS`.
            The machine-readable feed for this release is `latest.json`.
