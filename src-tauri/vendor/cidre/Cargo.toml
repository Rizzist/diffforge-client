[dependencies.cidre-macros]
version = "0.2"

[dependencies.half]
version = "2.6"
optional = true

[dependencies.parking_lot]
version = "0.12"
optional = true

[dependencies.tokio]
version = "1"
features = [
    "macros",
    "rt",
    "rt-multi-thread",
    "time",
    "net",
    "process",
    "io-util",
]
optional = true
default-features = false

[dev-dependencies.clap]
version = "4.5"
features = [
    "default",
    "derive",
]

[dev-dependencies.criterion]
version = "0.5"

[dev-dependencies.mimalloc]
version = "0.1"

[dev-dependencies.tokio]
version = "1"
features = [
    "signal",
    "sync",
]

[dev-dependencies.uuid]
version = "1.9"
features = [
    "v4",
    "v7",
    "fast-rng",
    "serde",
]
