<!doctype html>
<html lang="en" style="background: #030508">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#030508" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diff Forge AI</title>
    <script>
      (() => {
        const APPEARANCE_STORAGE_KEY = "diffforge.appearance.v1";
        const THEME_DEFAULT = "dark";
        const THEME_META_COLORS = {
          dark: "#030508",
          light: "#f5f5f7",
        };
        const normalizeTheme = (value) => {
          const theme = String(value || "").trim().toLowerCase();
          return theme === "light" ? "light" : THEME_DEFAULT;
        };

        try {
          const rawSettings = window.localStorage.getItem(APPEARANCE_STORAGE_KEY);
          const settings = rawSettings ? JSON.parse(rawSettings) : null;
          const theme = normalizeTheme(
            typeof settings === "string" ? settings : settings && settings.theme,
          );
          document.documentElement.dataset.forgeTheme = theme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute(
            "content",
            THEME_META_COLORS[theme] || THEME_META_COLORS[THEME_DEFAULT],
          );
        } catch {
          document.documentElement.dataset.forgeTheme = THEME_DEFAULT;
        }

        if (window.location.hash === "#/audio-widget") {
          document.documentElement.dataset.audioWidget = "true";
        }
      })();
    </script>
    <style>
      html,
      body,
      #app {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background: #030508;
      }

      body {
        overflow: hidden;
      }

      html[data-audio-widget="true"],
      html[data-audio-widget="true"] body,
      html[data-audio-widget="true"] #app {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border-radius: 999px;
        background: transparent !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
