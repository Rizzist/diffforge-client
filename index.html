<!doctype html>
<html lang="en" style="background: #030508">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#030508" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diff Forge AI</title>
    <script>
      (() => {
        const APPEARANCE_STORAGE_KEY = "diffforge.appearance.v1";
        const AUDIO_WIDGET_THEME_STORAGE_KEY = "diffforge.audio.widgetTheme";
        const THEME_DEFAULT = "dark";
        const THEME_META_COLORS = {
          dark: "#030508",
          light: "#f5f5f7",
        };
        const normalizeTheme = (value) => {
          const theme = String(value || "").trim().toLowerCase();
          return theme === "light" ? "light" : THEME_DEFAULT;
        };

        try {
          const isAudioWidget = window.location.hash === "#/audio-widget";
          const isAudioWidgetError = window.location.hash === "#/audio-widget-error";
          const isActivityOverlay = window.location.hash === "#/activity-overlay";
          const isSnippingEditor = window.location.hash.startsWith("#/snipping-editor");
          const rawSettings = isAudioWidget || isAudioWidgetError
            ? window.localStorage.getItem(AUDIO_WIDGET_THEME_STORAGE_KEY)
            : window.localStorage.getItem(APPEARANCE_STORAGE_KEY);
          const settings = rawSettings && !isAudioWidget && !isAudioWidgetError ? JSON.parse(rawSettings) : rawSettings;
          const theme = normalizeTheme(
            typeof settings === "string" ? settings : settings && settings.theme,
          );
          document.documentElement.dataset.forgeTheme = theme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute(
            "content",
            THEME_META_COLORS[theme] || THEME_META_COLORS[THEME_DEFAULT],
          );

          if (isAudioWidget) {
            document.documentElement.dataset.audioWidget = "true";
            document.documentElement.dataset.audioWidgetTheme = theme;
          }
          if (isAudioWidgetError) {
            document.documentElement.dataset.audioWidgetError = "true";
            document.documentElement.dataset.audioWidgetTheme = theme;
          }
          if (isActivityOverlay) {
            document.documentElement.dataset.activityOverlay = "true";
          }
          if (isSnippingEditor) {
            document.documentElement.dataset.snippingEditor = "true";
          }
          if (window.location.hash === "#/background-monitor") {
            document.documentElement.dataset.backgroundMonitor = "true";
          }
        } catch {
          document.documentElement.dataset.forgeTheme = THEME_DEFAULT;
          if (window.location.hash === "#/audio-widget") {
            document.documentElement.dataset.audioWidget = "true";
            document.documentElement.dataset.audioWidgetTheme = THEME_DEFAULT;
          }
          if (window.location.hash === "#/audio-widget-error") {
            document.documentElement.dataset.audioWidgetError = "true";
            document.documentElement.dataset.audioWidgetTheme = THEME_DEFAULT;
          }
          if (window.location.hash === "#/activity-overlay") {
            document.documentElement.dataset.activityOverlay = "true";
          }
          if (window.location.hash.startsWith("#/snipping-editor")) {
            document.documentElement.dataset.snippingEditor = "true";
          }
          if (window.location.hash === "#/background-monitor") {
            document.documentElement.dataset.backgroundMonitor = "true";
          }
        }
      })();
    </script>
    <style>
      html,
      body,
      #app {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background: #030508;
      }

      body {
        overflow: hidden;
      }

      html[data-audio-widget="true"],
      html[data-audio-widget="true"] body,
      html[data-audio-widget="true"] #app {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border-radius: 999px;
        background: transparent !important;
      }

      html[data-audio-widget-error="true"],
      html[data-audio-widget-error="true"] body,
      html[data-audio-widget-error="true"] #app {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: transparent !important;
      }

      html[data-activity-overlay="true"],
      html[data-activity-overlay="true"] body,
      html[data-activity-overlay="true"] #app {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border-radius: 18px;
        background: transparent !important;
      }

      html[data-background-monitor="true"],
      html[data-background-monitor="true"] body,
      html[data-background-monitor="true"] #app {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: transparent !important;
      }

      html[data-snipping-editor="true"],
      html[data-snipping-editor="true"] body,
      html[data-snipping-editor="true"] #app {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: transparent !important;
      }

      html[data-snipping-editor="true"] #app:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        border: 1px solid rgba(230, 236, 245, 0.12);
        border-radius: 18px;
        background:
          radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.08), transparent 42%),
          #05070b;
        box-shadow:
          0 28px 90px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      html[data-snipping-editor="true"] #app:empty::after {
        content: "";
        position: fixed;
        left: calc(50% - 14px);
        top: calc(50% - 14px);
        width: 28px;
        height: 28px;
        border: 3px solid rgba(148, 163, 184, 0.28);
        border-top-color: rgba(125, 176, 255, 0.95);
        border-radius: 999px;
        animation: snipping-editor-shell-spin 820ms linear infinite;
      }

      @keyframes snipping-editor-shell-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
